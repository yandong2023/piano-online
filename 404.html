<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>页面未找到 - Piano Online</title>
    <meta name="description" content="您访问的页面不存在。返回 Piano Online 首页，继续您的在线钢琴学习之旅。">
    <meta name="robots" content="noindex,follow">
    <link rel="canonical" href="https://pianoonline.cc/404.html" />
    <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
    <link rel="stylesheet" href="/css/piano.css">
    <style>
        .error-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }
        .error-code {
            font-size: 8rem;
            font-weight: bold;
            color: var(--primary-color);
            margin: 0;
            line-height: 1;
        }
        .error-message {
            font-size: 1.5rem;
            color: var(--text-secondary);
            margin: 1rem 0 2rem;
        }
        .error-actions {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        .error-btn {
            display: inline-block;
            padding: 0.75rem 2rem;
            border-radius: var(--border-radius);
            text-decoration: none;
            font-weight: 500;
            transition: var(--transition);
        }
        .error-btn-primary {
            background: var(--primary-color);
            color: white;
        }
        .error-btn-primary:hover {
            background: var(--secondary-color);
            transform: translateY(-2px);
        }
        .error-btn-secondary {
            background: var(--background-dark);
            color: var(--text-primary);
            border: 1px solid #ddd;
        }
        .error-btn-secondary:hover {
            background: #e8e8e8;
        }
        .error-links {
            margin-top: 2rem;
            color: var(--text-secondary);
        }
        .error-links a {
            color: var(--primary-color);
            text-decoration: none;
            margin: 0 0.5rem;
        }
        .error-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <h1 class="error-code">404</h1>
        <p class="error-message">抱歉，您访问的页面不存在</p>
        <div class="error-actions">
            <a href="/" class="error-btn error-btn-primary">返回首页</a>
            <a href="/tutorials.html" class="error-btn error-btn-secondary">浏览教程</a>
        </div>
        <div class="error-links">
            <p>您也可以访问：</p>
            <a href="/piano.html">在线钢琴</a> |
            <a href="/practice.html">练习工具</a> |
            <a href="/about.html">关于我们</a>
        </div>
    </div>
</body>
</html>
